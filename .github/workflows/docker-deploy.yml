# Build and deploy Docker container via self-hosted GitHub runner
#
# Prerequisites:
#   1. Add a self-hosted runner on the target server (Settings → Actions → Runners)
#   2. Create /opt/lang-lab/data on the server for production database storage
#      and /opt/lang-lab-release/data for the release database storage
#   3. Ensure the runner user has Docker permissions (docker group membership)
#
# Environment variables (set as repository secrets or variables):
#   DEPLOY_DATA_DIR          - production data directory (default: /opt/lang-lab/data)
#   DEPLOY_PORT              - production host port (default: 8090)
#   DEPLOY_RELEASE_DATA_DIR  - release data directory (default: /opt/lang-lab-release/data)
#   DEPLOY_RELEASE_PORT      - release host port (default: 8091)
#   LANG_LAB_ADMIN_TOKEN - repository secret for the Admin backup UI/API

name: Docker Deploy

on:
  push:
    branches: [main, release]

jobs:
  deploy:
    runs-on: self-hosted

    env:
      LANG_LAB_ADMIN_TOKEN: ${{ secrets.LANG_LAB_ADMIN_TOKEN }}
      MAIN_CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME || 'lang-lab' }}
      MAIN_DATA_DIR: ${{ vars.DEPLOY_DATA_DIR || '/opt/lang-lab/data' }}
      MAIN_IMAGE_NAME: ${{ vars.DEPLOY_IMAGE_NAME || 'lang-lab' }}
      MAIN_PORT: ${{ vars.DEPLOY_PORT || '8090' }}
      RELEASE_CONTAINER_NAME: ${{ vars.DEPLOY_RELEASE_CONTAINER_NAME || 'lang-lab-release' }}
      RELEASE_DATA_DIR: ${{ vars.DEPLOY_RELEASE_DATA_DIR || '/opt/lang-lab-release/data' }}
      RELEASE_IMAGE_NAME: ${{ vars.DEPLOY_RELEASE_IMAGE_NAME || 'lang-lab-release' }}
      RELEASE_PORT: ${{ vars.DEPLOY_RELEASE_PORT || '8091' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy target
        run: |
          if [ "${GITHUB_REF_NAME}" = "release" ]; then
            {
              echo "IMAGE_NAME=${RELEASE_IMAGE_NAME}"
              echo "CONTAINER_NAME=${RELEASE_CONTAINER_NAME}"
              echo "DEPLOY_PORT=${RELEASE_PORT}"
              echo "DEPLOY_DATA_DIR=${RELEASE_DATA_DIR}"
            } >> "$GITHUB_ENV"
          else
            {
              echo "IMAGE_NAME=${MAIN_IMAGE_NAME}"
              echo "CONTAINER_NAME=${MAIN_CONTAINER_NAME}"
              echo "DEPLOY_PORT=${MAIN_PORT}"
              echo "DEPLOY_DATA_DIR=${MAIN_DATA_DIR}"
            } >> "$GITHUB_ENV"
          fi

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: Stop and remove old container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      - name: Start new container
        run: |
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p ${{ env.DEPLOY_PORT }}:8090 \
            -v ${{ env.DEPLOY_DATA_DIR }}:/app/data \
            -e LANG_LAB_ADMIN_TOKEN="${{ env.LANG_LAB_ADMIN_TOKEN }}" \
            -e LANG_LAB_BACKUP_DIR=/app/data/backups \
            --restart unless-stopped \
            ${{ env.IMAGE_NAME }}:latest

      - name: Clean up old images (keep last 3)
        run: |
          docker image prune -f --filter "until=24h" || true
