# Build and deploy Docker container via self-hosted GitHub runner
#
# Prerequisites:
#   1. Add a self-hosted runner on the target server (Settings → Actions → Runners)
#   2. Create /opt/lang-lab/data on the server for persistent database storage
#   3. Ensure the runner user has Docker permissions (docker group membership)
#
# Environment variables (set as repository secrets or variables):
#   DEPLOY_DATA_DIR  - path to the data directory on the server (default: /opt/lang-lab/data)
#   DEPLOY_PORT      - host port to expose (default: 8090)

name: Docker Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    env:
      IMAGE_NAME: lang-lab
      CONTAINER_NAME: lang-lab
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '8090' }}
      DEPLOY_DATA_DIR: ${{ vars.DEPLOY_DATA_DIR || '/opt/lang-lab/data' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: Ensure data directory exists
        run: |
          mkdir -p ${{ env.DEPLOY_DATA_DIR }}
          chown -R 1000:1000 ${{ env.DEPLOY_DATA_DIR }}

      - name: Stop and remove old container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      - name: Start new container
        run: |
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p ${{ env.DEPLOY_PORT }}:8090 \
            -v ${{ env.DEPLOY_DATA_DIR }}:/app/data \
            --restart unless-stopped \
            ${{ env.IMAGE_NAME }}:latest

      - name: Clean up old images (keep last 3)
        run: |
          docker image prune -f --filter "until=24h" || true